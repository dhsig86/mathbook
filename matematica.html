<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KumonGen · Matemática</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Mesmos estilos do preview */
        #a4-sheet {
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 1123px;
            height: 794px;
            padding: 0;
            box-sizing: border-box;
            position: relative;
            display: flex;
            overflow: hidden;
        }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #a4-sheet { box-shadow: none; margin: 0 auto; }
        }
        .dashed-center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 2px dashed #cbd5e1;
            pointer-events: none;
        }
        .page {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 30px 22px;
            box-sizing: border-box;
        }
        .page-left {
            border-right: 1px solid #e2e8f0;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 7px;
            margin-bottom: 7px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .page-header h3 {
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            color: #0f172a;
            margin: 0;
        }
        .page-header p {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            max-width: 200px;
            margin: 0;
        }
        .exercise-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: visible;
        }
        .exercise-row {
            display: flex;
            align-items: center;
            gap: 7px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 3px;
            height: 32px;
            line-height: 32px;
            box-sizing: border-box;
        }
        .exercise-number {
            font-size: 0.9rem;
            font-weight: 900;
            color: #cbd5e1;
            width: 20px;
            text-align: right;
            line-height: 32px;
        }
        .exercise-content {
            flex: 1;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            line-height: 32px;
            font-size: 1.1rem;
        }
        .page-footer {
            border-top: 1px solid #e2e8f0;
            margin-top: 3px;
            padding-top: 3px;
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .page-footer span {
            background-color: #0f172a;
            color: white;
            padding: 2px 6px;
            border-radius: 9999px;
            font-weight: 700;
        }
        .answer-line {
            border-bottom: 2px solid #1e293b;
            min-width: 40px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .circle-placeholder {
            width: 14px;
            height: 14px;
            border: 1px solid #94a3b8;
            border-radius: 9999px;
            display: inline-block;
            margin-right: 2px;
        }
        .tens-block {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 1px solid #94a3b8;
        }
        .tens-block.blue { background-color: #bfdbfe; }
        .tens-block.yellow { background-color: #fef08a; }
        .param-control {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            margin-top: 4px;
        }
        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }
        .param-row input, .param-row select {
            width: 70px;
            padding: 2px 4px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans antialiased overflow-hidden h-screen flex">

<!-- SIDEBAR -->
<aside class="no-print w-80 bg-white shadow-2xl flex flex-col z-20 text-slate-800 overflow-y-auto">
    <div class="p-6 bg-indigo-700 text-white">
        <h1 class="text-xl font-black flex items-center gap-2">
            <i class="fas fa-calculator"></i> KUMON·MAT <span class="text-indigo-300 text-xs ml-1">v1</span>
        </h1>
        <p class="text-[10px] uppercase tracking-widest font-bold opacity-70">matemática personalizável</p>
    </div>

    <div class="flex-1 p-5 space-y-6">
        <!-- Link voltar -->
        <a href="index.html" class="text-xs text-indigo-600 hover:underline flex items-center gap-1"><i class="fas fa-arrow-left"></i> Início</a>

        <!-- Níveis -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">nível</label>
            <div id="levelList" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
        </div>

        <!-- Visual -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">visual</label>
            <div class="bg-slate-50 p-3 rounded-xl space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-xs">linhas/página</span>
                    <select id="linesPerPage" class="border rounded px-2 py-1 text-xs">
                        <option value="6">6</option>
                        <option value="8" selected>8</option>
                        <option value="10">10</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-xs">zoom</span>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustZoom(-0.1)" class="bg-white border w-6 h-6 rounded"><i class="fas fa-minus"></i></button>
                        <span id="zoomValue" class="text-xs font-mono w-12 text-center">70%</span>
                        <button onclick="adjustZoom(0.1)" class="bg-white border w-6 h-6 rounded"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Parâmetros -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">parâmetros</label>
            <div id="paramPanel" class="bg-slate-50 p-3 rounded-xl min-h-[60px] text-xs"></div>
        </div>

        <!-- Ações -->
        <div class="border-t border-slate-100 pt-4 space-y-2">
            <button onclick="refreshPreview()" class="w-full flex items-center justify-center gap-2 bg-indigo-100 text-indigo-700 p-3 rounded-xl hover:bg-indigo-200 font-bold text-sm">
                <i class="fas fa-sync-alt"></i> atualizar preview
            </button>
            <button onclick="generatePDF()" class="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white p-4 rounded-xl hover:bg-indigo-700 shadow-lg font-black text-sm">
                <i class="fas fa-file-pdf"></i> GERAR PDF
            </button>
        </div>
        <div class="text-center text-[8px] text-slate-400 pt-4 border-t border-slate-100">
            criado por Dario Hart · Free use 2026
        </div>
    </div>
</aside>

<!-- PREVIEW -->
<main class="flex-1 overflow-auto bg-[#0F172A] flex items-start justify-center p-8 no-print" id="previewContainer">
    <div id="zoomContainer" class="transition-transform duration-200 origin-top" style="transform:scale(0.7)">
        <div id="a4-sheet" class="bg-white shadow-2xl flex relative">
            <div class="dashed-center-line"></div>
            <div id="pageLeft" class="page page-left"></div>
            <div id="pageRight" class="page"></div>
        </div>
    </div>
</main>

<!-- BANCO DE DADOS DA MATEMÁTICA -->
<script>
    const LevelLibrary = {
        matematica: [
            { id: 'm1', title: 'M1 · Números 1 a 5 (quantidade)', type: 'quantity', numbers: [1,2,3,4,5], instruction: 'Pinte a quantidade de círculos.' },
            { id: 'm2', title: 'M2 · Adição (+1 a +5)', type: 'math', instruction: 'Resolva as adições.' },
            { id: 'm3', title: 'M3 · Complete a sequência (1-10)', type: 'sequence', sequences: [[1,2,'__',4,5],[5,6,7,'__',9],[8,'__',10],[2,3,'__',5]], instruction: 'Escreva o número que falta.' },
            { id: 'm4', title: 'M4 · Dezena + unidade (11-19)', type: 'tens', numbers: [11,12,13,14,15,16,17,18,19], instruction: 'Observe o grupo de 10 e as unidades.' },
            { id: 'm5', title: 'M5 · Comparação (maior/menor)', type: 'compare', pairs: [[3,5],[7,2],[4,4],[6,9],[1,8]], instruction: 'Circule o número maior (ou igual).' },
            { id: 'm6', title: 'M6 · Subtração (-1 a -5)', type: 'math', instruction: 'Resolva as subtrações.' },
            { id: 'm7', title: 'M7 · Números vizinhos (1-20)', type: 'neighbors', centers: [5,10,15,18], instruction: 'Escreva o número que vem antes e depois.' }
        ]
    };

    // Configuração inicial
    let currentLevelId = 'm2';
    let itemsPerPage = 8;
    let currentZoom = 0.7;

    // Parâmetros customizáveis
    let customParams = {
        operator: '+',
        operand: 1,
        min: 1,
        max: 9
    };

    // Funções específicas
    function generateItemsForLevel(level) {
        if (!level) return [];

        let baseItems = [];

        switch (level.type) {
            case 'quantity':
                baseItems = level.numbers.map(n => ({ type: 'quantity', value: n }));
                break;
            case 'math':
                let items = [];
                for (let i = 0; i < itemsPerPage * 2; i++) {
                    let a = Math.floor(Math.random() * (customParams.max - customParams.min + 1)) + customParams.min;
                    items.push({
                        type: 'math',
                        operand1: a,
                        operator: customParams.operator,
                        operand2: customParams.operand
                    });
                }
                return items;
            case 'sequence':
                baseItems = level.sequences.map(seq => ({ type: 'sequence', sequence: seq }));
                break;
            case 'tens':
                baseItems = level.numbers.map(n => ({ type: 'tens', number: n }));
                break;
            case 'compare':
                baseItems = level.pairs.map(p => ({ type: 'compare', pair: p }));
                break;
            case 'neighbors':
                baseItems = level.centers.map(c => ({ type: 'neighbors', center: c }));
                break;
            default:
                return Array(itemsPerPage * 2).fill({ type: 'unknown' });
        }

        const target = itemsPerPage * 2;
        let result = [];
        for (let i = 0; i < target; i++) {
            result.push({ ...baseItems[i % baseItems.length] });
        }
        return result;
    }

    // Atualiza painel de parâmetros
    function updateParamPanel() {
        const level = LevelLibrary.matematica.find(l => l.id === currentLevelId);
        if (!level) return;

        if (level.type === 'math') {
            paramPanel.innerHTML = `
                <div class="param-control">
                    <div class="param-row">
                        <span>Operador:</span>
                        <select id="paramOperator">
                            <option value="+" ${customParams.operator === '+' ? 'selected' : ''}>+</option>
                            <option value="-" ${customParams.operator === '-' ? 'selected' : ''}>-</option>
                        </select>
                    </div>
                    <div class="param-row">
                        <span>Valor:</span>
                        <input type="number" id="paramOperand" value="${customParams.operand}" min="1" max="20" step="1">
                    </div>
                    <div class="param-row">
                        <span>Mínimo:</span>
                        <input type="number" id="paramMin" value="${customParams.min}" min="1" max="50">
                    </div>
                    <div class="param-row">
                        <span>Máximo:</span>
                        <input type="number" id="paramMax" value="${customParams.max}" min="1" max="50">
                    </div>
                </div>
            `;
            document.getElementById('paramOperator')?.addEventListener('change', e => customParams.operator = e.target.value);
            document.getElementById('paramOperand')?.addEventListener('change', e => customParams.operand = parseInt(e.target.value) || 1);
            document.getElementById('paramMin')?.addEventListener('change', e => customParams.min = parseInt(e.target.value) || 1);
            document.getElementById('paramMax')?.addEventListener('change', e => customParams.max = parseInt(e.target.value) || 1);
        } else {
            paramPanel.innerHTML = '<div class="text-slate-400">Sem parâmetros adicionais.</div>';
        }
    }

    // Renderiza lista de níveis
    function renderLevelList() {
        const levels = LevelLibrary.matematica;
        let html = '';
        levels.forEach(lvl => {
            const active = (lvl.id === currentLevelId) ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 hover:border-slate-200';
            html += `<button onclick="selectLevel('${lvl.id}')" class="w-full text-left p-3 rounded-xl border-2 transition-all ${active}">
                <div class="text-xs font-bold ${lvl.id === currentLevelId ? 'text-indigo-700' : 'text-slate-600'}">${lvl.title}</div>
            </button>`;
        });
        levelListDiv.innerHTML = html;
    }

    window.selectLevel = function(id) {
        currentLevelId = id;
        renderLevelList();
        updateParamPanel();
        refreshPreview();
    };

    function refreshPreview() {
        const level = LevelLibrary.matematica.find(l => l.id === currentLevelId);
        if (!level) return;

        const allItems = generateItemsForLevel(level);
        const leftItems = allItems.slice(0, itemsPerPage);
        const rightItems = allItems.slice(itemsPerPage, itemsPerPage * 2);

        buildPage(pageLeft, level, 1, leftItems);
        buildPage(pageRight, level, 2, rightItems);
    }

    // Inicialização
    function init() {
        initRefs();
        renderLevelList();
        updateParamPanel();
        refreshPreview();
        zoomSpan.innerText = Math.round(currentZoom * 100) + '%';
        zoomContainer.style.transform = `scale(${currentZoom})`;

        document.getElementById('linesPerPage').addEventListener('change', e => {
            itemsPerPage = parseInt(e.target.value);
            refreshPreview();
        });
    }

    init();
</script>

<!-- Inclui o gerador.js (deve conter as funções buildPage, initRefs, adjustZoom, generatePDF) -->
<script src="gerador.js"></script>
</body>
</html>
