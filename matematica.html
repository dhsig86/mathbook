<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KumonGen · Matemática</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ESTILOS PADRÃO DO PREVIEW A4 */
        #a4-sheet {
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 1123px;
            height: 794px;
            padding: 0;
            box-sizing: border-box;
            position: relative;
            display: flex;
            overflow: hidden;
        }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #a4-sheet { box-shadow: none; margin: 0 auto; }
        }
        .dashed-center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 2px dashed #cbd5e1;
            pointer-events: none;
        }
        .page {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 30px 22px;
            box-sizing: border-box;
        }
        .page-left {
            border-right: 1px solid #e2e8f0;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 7px;
            margin-bottom: 7px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .page-header h3 {
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            color: #0f172a;
            margin: 0;
        }
        .page-header p {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            max-width: 200px;
            margin: 0;
        }
        .exercise-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: visible;
        }
        .exercise-row {
            display: flex;
            align-items: center;
            gap: 7px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 3px;
            height: 32px;
            line-height: 32px;
            box-sizing: border-box;
        }
        .exercise-number {
            font-size: 0.9rem;
            font-weight: 900;
            color: #cbd5e1;
            width: 20px;
            text-align: right;
            line-height: 32px;
        }
        .exercise-content {
            flex: 1;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            line-height: 32px;
            font-size: 1.1rem;
        }
        .page-footer {
            border-top: 1px solid #e2e8f0;
            margin-top: 3px;
            padding-top: 3px;
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .page-footer span {
            background-color: #0f172a;
            color: white;
            padding: 2px 6px;
            border-radius: 9999px;
            font-weight: 700;
        }
        .answer-line {
            border-bottom: 2px solid #1e293b;
            min-width: 40px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .trace-cell {
            border: 1px dashed #94a3b8;
            background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 4px, #f1f5f9 4px, #f1f5f9 8px);
            width: 28px;
            height: 28px;
        }
        .circle-placeholder {
            width: 14px;
            height: 14px;
            border: 1px solid #94a3b8;
            border-radius: 9999px;
            display: inline-block;
            margin-right: 2px;
        }
        .tens-block {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 1px solid #94a3b8;
        }
        .tens-block.blue { background-color: #bfdbfe; }
        .tens-block.yellow { background-color: #fef08a; }

        /* ESTILOS RESPONSIVOS DA SIDEBAR E CONTROLES */
        .param-control {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-top: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .param-row {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 4px;
            font-size: 0.75rem;
        }

        .param-row label {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .param-row input,
        .param-row select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .flex-row-params {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .button-group button {
            flex: 1 1 auto;
            padding: 6px 8px;
            font-size: 0.7rem;
            background-color: #e2e8f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .button-group button:hover {
            background-color: #cbd5e1;
        }

        #wordListContainer {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 8px;
            background: white;
        }

        /* Sidebar */
        aside {
            width: 100%;
            max-width: 320px;
            height: 100vh;
            overflow-y: auto;
        }

        /* Ajustes para telas pequenas */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }
            aside {
                max-width: 100%;
                height: auto;
                position: static;
            }
            main {
                padding: 8px !important;
                min-height: 400px;
            }
            #zoomContainer {
                transform: none !important;
                width: 100%;
                height: auto;
            }
            #a4-sheet {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 297 / 210;
            }
            .page {
                padding: 15px 11px;
            }
            .exercise-row {
                height: 28px;
                line-height: 28px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 640px) {
            .flex-row-params {
                flex-direction: row;
                align-items: center;
            }
            .param-row {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .param-row input,
            .param-row select {
                width: auto;
                min-width: 80px;
            }
        }
    </style>
</head>
<body class="bg-slate-900 font-sans antialiased overflow-hidden h-screen flex flex-col md:flex-row">

<!-- SIDEBAR COM GRADIENTE AZUL E BRANCO -->
<aside class="no-print w-full md:w-80 bg-white shadow-2xl flex flex-col z-20 text-slate-800 overflow-y-auto">
    <div class="p-6 bg-gradient-to-br from-blue-600 to-blue-400 text-white">
        <h1 class="text-xl font-black flex items-center gap-2">
            <i class="fas fa-calculator"></i> KUMON·MAT <span class="text-blue-200 text-xs ml-1">v2</span>
        </h1>
        <p class="text-[10px] uppercase tracking-widest font-bold opacity-80">matemática personalizável</p>
    </div>

    <div class="flex-1 p-5 space-y-6">
        <!-- Link voltar -->
        <a href="index.html" class="text-xs text-blue-600 hover:underline flex items-center gap-1"><i class="fas fa-arrow-left"></i> Início</a>

        <!-- Níveis -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">nível</label>
            <div id="levelList" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
        </div>

        <!-- Visual / repetição -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">visual</label>
            <div class="bg-slate-50 p-3 rounded-xl space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-xs">linhas/página</span>
                    <select id="linesPerPage" class="border rounded px-2 py-1 text-xs">
                        <option value="6">6</option>
                        <option value="8" selected>8</option>
                        <option value="10">10</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-xs">zoom</span>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustZoom(-0.1)" class="bg-white border w-6 h-6 rounded"><i class="fas fa-minus"></i></button>
                        <span id="zoomValue" class="text-xs font-mono w-12 text-center">70%</span>
                        <button onclick="adjustZoom(0.1)" class="bg-white border w-6 h-6 rounded"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Parâmetros dinâmicos -->
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">parâmetros</label>
            <div id="paramPanel" class="bg-slate-50 p-3 rounded-xl min-h-[100px] text-xs"></div>
        </div>

        <!-- Ações -->
        <div class="border-t border-slate-100 pt-4 space-y-2">
            <button onclick="refreshPreview()" class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 font-bold text-sm shadow">
                <i class="fas fa-sync-alt"></i> atualizar preview
            </button>
            <button onclick="generatePDF()" class="w-full flex items-center justify-center gap-2 bg-blue-500 text-white p-4 rounded-xl hover:bg-blue-600 shadow-lg font-black text-sm">
                <i class="fas fa-file-pdf"></i> GERAR PDF
            </button>
        </div>
        <div class="text-center text-[8px] text-slate-400 pt-4 border-t border-slate-100">
            criado por Dario Hart · Free use 2026
        </div>
    </div>
</aside>

<!-- PREVIEW (A4 paisagem) -->
<main class="flex-1 overflow-auto bg-[#0F172A] flex items-start justify-center p-8 no-print" id="previewContainer">
    <div id="zoomContainer" class="transition-transform duration-200 origin-top" style="transform:scale(0.7)">
        <div id="a4-sheet" class="bg-white shadow-2xl flex relative">
            <div class="dashed-center-line"></div>
            <div id="pageLeft" class="page page-left"></div>
            <div id="pageRight" class="page"></div>
        </div>
    </div>
</main>

<!-- Scripts -->
<script src="gerador.js"></script>
<script src="matematica.js"></script>

<script>
    // Ajuste dinâmico da escala do preview para telas pequenas
    function adjustPreviewScale() {
        const container = document.getElementById('previewContainer');
        const sheet = document.getElementById('a4-sheet');
        const zoomContainer = document.getElementById('zoomContainer');
        if (!container || !sheet || !zoomContainer) return;

        const containerWidth = container.clientWidth;
        const containerHeight = container.clientHeight;
        const sheetWidth = 1123; // px
        const sheetHeight = 794;  // px

        const scaleX = containerWidth / sheetWidth;
        const scaleY = containerHeight / sheetHeight;
        const scale = Math.min(scaleX, scaleY, 1); // não ultrapassar 1

        zoomContainer.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', adjustPreviewScale);
    document.addEventListener('DOMContentLoaded', adjustPreviewScale);
</script>

</body>
</html>
