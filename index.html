<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KumonGen · cadernos adaptados</title>
    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas + jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Dimensões exatas da folha A4 paisagem */
        #a4-sheet {
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 297mm;
            height: 210mm;
            padding: 8mm 10mm;
            box-sizing: border-box;
            position: relative;
            display: flex;
        }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #a4-sheet { box-shadow: none; margin: 0 auto; }
        }
        .dashed-center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            border-left: 2px dashed #cbd5e1;
            pointer-events: none;
        }
        /* Estrutura de cada página (A5) */
        .page {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .page-left {
            padding-right: 6mm;
            border-right: 1px solid #e2e8f0;
        }
        .page-right {
            padding-left: 6mm;
        }
        /* Cabeçalho compacto */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 2mm;
            margin-bottom: 2mm;
            font-size: 0.7rem;
        }
        .page-header h3 {
            font-size: 1rem;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            color: #0f172a;
        }
        .page-header p {
            font-size: 0.5rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            max-width: 50mm;
        }
        /* Grid de exercícios ocupa espaço flexível */
        .exercise-grid {
            flex: 1;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 1mm;
        }
        /* Linha de exercício com altura fixa */
        .exercise-row {
            display: flex;
            align-items: center;
            gap: 2mm;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1mm;
            min-height: 8mm;
        }
        .exercise-number {
            font-size: 0.6rem;
            font-weight: 900;
            color: #cbd5e1;
            width: 4mm;
            text-align: right;
        }
        .exercise-content {
            flex: 1;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 2mm;
        }
        /* Rodapé simples (apenas página) */
        .page-footer {
            border-top: 1px solid #e2e8f0;
            margin-top: 1mm;
            padding-top: 1mm;
            display: flex;
            justify-content: flex-end;
            font-size: 0.6rem;
        }
        .page-footer span {
            background-color: #0f172a;
            color: white;
            padding: 1px 4px;
            border-radius: 9999px;
            font-weight: 700;
        }
        /* Elementos de resposta */
        .answer-line {
            border-bottom: 2px solid #1e293b;
            min-width: 8mm;
            height: 5mm;
            display: inline-block;
        }
        .trace-cell {
            border: 1px dashed #94a3b8;
            background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 4px, #f1f5f9 4px, #f1f5f9 8px);
            width: 8mm;
            height: 8mm;
        }
        .circle-placeholder {
            width: 4mm;
            height: 4mm;
            border: 1px solid #94a3b8;
            border-radius: 9999px;
            display: inline-block;
        }
        .tens-block {
            display: inline-block;
            width: 4mm;
            height: 4mm;
            border: 1px solid #94a3b8;
        }
        .tens-block.blue {
            background-color: #bfdbfe;
        }
        .tens-block.yellow {
            background-color: #fef08a;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans antialiased overflow-hidden h-screen flex">

<!-- ======================================================================
     LÓGICA PRINCIPAL (JAVASCRIPT)
     ====================================================================== -->
<script>
(function() {
    // ---------- referências ----------
    const pageLeft = document.getElementById('pageLeft');
    const pageRight = document.getElementById('pageRight');
    const levelListDiv = document.getElementById('levelList');
    const btnPort = document.getElementById('btnPort');
    const btnMat = document.getElementById('btnMat');
    const zoomContainer = document.getElementById('zoomContainer');
    const zoomSpan = document.getElementById('zoomValue');

    // estado
    let currentSubject = APP_CONFIG.subject;
    let currentLevelId = APP_CONFIG.selectedLevelId;
    let currentZoom = APP_CONFIG.defaultZoom;
    let itemsPerPage = APP_CONFIG.itemsPerPage;

    // ---------- funções auxiliares ----------
    window.adjustZoom = function(delta) {
        currentZoom = Math.min(1.2, Math.max(0.4, currentZoom + delta));
        zoomContainer.style.transform = `scale(${currentZoom})`;
        zoomSpan.innerText = Math.round(currentZoom*100)+'%';
    };

    window.changeLinesPerPage = function() {
        itemsPerPage = parseInt(document.getElementById('linesPerPage').value);
        refreshPreview();
    };

    window.switchSubject = function(subj) {
        currentSubject = subj;
        btnPort.className = `flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-bold transition-all ${subj==='portugues' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`;
        btnMat.className = `flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-bold transition-all ${subj==='matematica' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`;
        const levels = LevelLibrary[subj];
        if (levels && levels.length) {
            currentLevelId = levels[0].id;
        }
        renderLevelList();
        refreshPreview();
    };

    function renderLevelList() {
        const levels = LevelLibrary[currentSubject] || [];
        let html = '';
        levels.forEach(lvl => {
            const active = (lvl.id === currentLevelId) ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 hover:border-slate-200';
            html += `<button onclick="selectLevel('${lvl.id}')" class="w-full text-left p-3 rounded-xl border-2 transition-all ${active}">
                <div class="text-xs font-bold ${lvl.id === currentLevelId ? 'text-indigo-700' : 'text-slate-600'}">${lvl.title}</div>
            </button>`;
        });
        levelListDiv.innerHTML = html;
    }

    window.selectLevel = function(id) {
        currentLevelId = id;
        renderLevelList();
        refreshPreview();
    };

    // Geração de itens (cíclica para preencher exatamente itemsPerPage*2)
    function generateItemsForLevel(level) {
        if (!level) return [];

        let baseItems = [];

        switch (level.type) {
            case 'quantity':
                baseItems = level.numbers.map(n => ({ type: 'quantity', value: n }));
                break;
            case 'math':
                // matemática: gera aleatório
                let items = [];
                for (let i=0; i<itemsPerPage*2; i++) {
                    let a = Math.floor(Math.random() * (level.range[1] - level.range[0] + 1)) + level.range[0];
                    items.push({ type: 'math', operand1: a, operator: level.operator, operand2: level.operand });
                }
                return items;
            case 'sequence':
                baseItems = level.sequences.map(seq => ({ type: 'sequence', sequence: seq }));
                break;
            case 'tens':
                baseItems = level.numbers.map(n => ({ type: 'tens', number: n }));
                break;
            case 'compare':
                baseItems = level.pairs.map(p => ({ type: 'compare', pair: p }));
                break;
            case 'neighbors':
                baseItems = level.centers.map(c => ({ type: 'neighbors', center: c }));
                break;
            case 'trace':
                baseItems = level.letters.map(l => ({ type: 'trace', char: l }));
                break;
            case 'syllables':
                baseItems = level.syllables.map(s => ({ type: 'syllable', syllable: s }));
                break;
            case 'wordbuilding':
                baseItems = level.words.map(w => ({ type: 'word', word: w.word, parts: w.parts }));
                break;
            default:
                return Array(itemsPerPage*2).fill({ type: 'unknown' });
        }

        // Preenche ciclicamente até o tamanho desejado
        const target = itemsPerPage * 2;
        let result = [];
        for (let i=0; i<target; i++) {
            result.push({ ...baseItems[i % baseItems.length] });
        }
        return result;
    }

    // Constrói uma página (esquerda ou direita)
    function buildPage(container, level, pageNum, items) {
        container.innerHTML = ''; // limpa

        // Cabeçalho
        const header = document.createElement('div');
        header.className = 'page-header';
        header.innerHTML = `
            <div>
                <h3>${level?.title || ''}</h3>
                <p>${level?.instruction || ''}</p>
            </div>
            <div class="text-right">
                <div class="text-[0.4rem] font-bold text-slate-400">DATA: ___/___/___ TEMPO: ___ min</div>
                <div class="border border-slate-900 px-2 py-0.5 mt-1 min-w-[30mm]">
                    <span class="text-[0.4rem] font-bold">NOME:</span>
                    <span class="ml-2 text-[0.4rem]">____________________</span>
                </div>
            </div>
        `;
        container.appendChild(header);

        // Grid de exercícios
        const grid = document.createElement('div');
        grid.className = 'exercise-grid';
        container.appendChild(grid);

        // Rodapé (apenas número da página)
        const footer = document.createElement('div');
        footer.className = 'page-footer';
        footer.innerHTML = `<span>PÁG ${pageNum}</span>`;
        container.appendChild(footer);

        // Preenche o grid com os itens
        items.forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = 'exercise-row';

            // Número
            const num = document.createElement('span');
            num.className = 'exercise-number';
            num.innerText = (idx+1);
            row.appendChild(num);

            // Conteúdo
            const content = document.createElement('div');
            content.className = 'exercise-content';

            if (item.type === 'quantity') {
                let circles = '';
                for (let i=0; i<item.value; i++) circles += '<span class="circle-placeholder"></span>';
                content.innerHTML = `<span class="text-xl font-black w-4">${item.value}</span> ${circles} <span class="answer-line"></span>`;
            }
            else if (item.type === 'math') {
                content.innerHTML = `<span class="text-sm font-light italic">${item.operand1} ${item.operator} ${item.operand2} =</span> <span class="answer-line"></span>`;
            }
            else if (item.type === 'sequence') {
                const seq = item.sequence.map(v => v === '__' ? '___' : v).join(' · ');
                content.innerHTML = `<span class="text-xs bg-slate-50 px-1">${seq}</span> <span class="answer-line"></span>`;
            }
            else if (item.type === 'tens') {
                const num = item.number;
                const tens = Math.floor(num/10);
                const units = num % 10;
                let blocks = `<span class="text-xs font-bold mr-1">${num} =</span>`;
                for (let i=0; i<tens; i++) blocks += '<span class="tens-block blue"></span>';
                if (tens>0 && units>0) blocks += '<span class="mx-0.5">+</span>';
                for (let i=0; i<units; i++) blocks += '<span class="tens-block yellow"></span>';
                content.innerHTML = blocks + '<span class="answer-line ml-1"></span>';
            }
            else if (item.type === 'compare') {
                content.innerHTML = `<span class="text-xs bg-slate-50 px-1">${item.pair[0]} _ ${item.pair[1]}</span> <span class="answer-line"></span>`;
            }
            else if (item.type === 'neighbors') {
                content.innerHTML = `<span class="text-xs">____ , ${item.center} , ____</span> <span class="answer-line"></span>`;
            }
            else if (item.type === 'trace') {
                content.innerHTML = `<span class="text-2xl font-black text-slate-300 border-2 border-dashed border-slate-300 px-1">${item.char}</span> <span class="flex-1 border-b-2 border-dotted border-slate-300 mx-1"></span> <span class="trace-cell"></span>`;
            }
            else if (item.type === 'syllable') {
                content.innerHTML = `<span class="text-lg font-bold text-slate-500 border-r pr-1 mr-1">${item.syllable}</span> <span class="answer-line w-4"></span> <span class="answer-line w-4"></span>`;
            }
            else if (item.type === 'word') {
                const partsHtml = item.parts.map(p => `<span class="bg-slate-100 border px-0.5 text-xs">${p}</span>`).join('<span class="mx-0.5">+</span>');
                content.innerHTML = `<div class="flex items-center gap-0.5">${partsHtml}</div> <span class="w-12 border-b-4 border-double border-slate-400 ml-2"></span>`;
            }
            else {
                content.innerHTML = `<span class="text-slate-300">?</span>`;
            }

            row.appendChild(content);
            grid.appendChild(row);
        });
    }

    function refreshPreview() {
        const level = LevelLibrary[currentSubject].find(l => l.id === currentLevelId);
        if (!level) return;

        const allItems = generateItemsForLevel(level);
        const leftItems = allItems.slice(0, itemsPerPage);
        const rightItems = allItems.slice(itemsPerPage, itemsPerPage*2);

        buildPage(pageLeft, level, 1, leftItems);
        buildPage(pageRight, level, 2, rightItems);
    }

    // Geração de PDF
    window.generatePDF = function() {
        const element = document.getElementById('a4-sheet');
        html2canvas(element, {
            scale: 2.5,
            backgroundColor: '#ffffff',
            logging: false,
            allowTaint: false,
            useCORS: true
        }).then((canvas) => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
            pdf.save(`kumon_${currentSubject}_${currentLevelId}.pdf`);
        }).catch(error => {
            alert('Erro ao gerar PDF: ' + error);
        });
    };

    // Inicialização
    function init() {
        renderLevelList();
        switchSubject(currentSubject);
        zoomSpan.innerText = Math.round(currentZoom*100)+'%';
        zoomContainer.style.transform = `scale(${currentZoom})`;
    }

    init();
})();
</script>

</body>
</html>
